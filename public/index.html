<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olympus Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header id="app-header">
    <div class="header-left">
      <h1>🏛️ Olympus Games</h1>
    </div>
    <div class="header-center">
      <div class="payout-block">
        <span class="payout-label">Next payout in:</span>
        <span id="payout-countdown" class="payout-countdown">--:--</span>
        <span id="round-counter" class="round-counter">Rounds: 0</span>
        <span id="recovery-status" class="round-counter" style="display:none"></span>
      </div>
      <div class="payout-actions admin-only hidden">
        <button class="btn btn-warning btn-sm" onclick="triggerPayout()">💰 Payout Now</button>
        <button id="pause-btn" class="btn btn-secondary btn-sm" onclick="togglePause()">⏸ Pause</button>
        <button class="btn btn-secondary btn-sm" onclick="resetTimer()">🔄 Reset Timer</button>
      </div>
    </div>
    <div class="header-right" id="auth-area">
      <!-- auth area injected automatically -->
    </div>
    <div class="header-right admin-only hidden" style="display:flex;gap:8px;">
      <button id="edit-mode-btn" class="btn btn-secondary btn-sm" onclick="toggleEditMode()">✏️ Edit Mode</button>
      <button class="btn btn-primary btn-sm" onclick="openSettings()">⚙️ Settings</button>
      <button class="btn btn-warning btn-sm" onclick="confirmResetPoints()" title="Reset just team points and timer">🔄 Reset Points</button>
      <button class="btn btn-danger btn-sm" title="Reset whole game back to defaults" onclick="confirmResetGame()">🗑️ Reset All</button>
    </div>
  </header>

  <!-- Main Content -->
  <div style="display:flex;">
    <main id="main-content" style="flex:3;">
      <!-- Post Board -->
      <section id="posts-section">
        <div class="section-title-row">
          <h2 class="section-title">📍 Post Board</h2>
          <div id="post-board-actions" class="post-board-actions"></div>
        </div>
        <div id="posts-grid" class="posts-grid">
          <div class="loading">Connecting…</div>
        </div>
      </section>

      <!-- Teams -->
      <section id="teams-section">
        <h2 class="section-title">👥 Teams</h2>
        <div id="teams-grid" class="teams-grid">
          <div class="loading">Connecting…</div>
        </div>
      </section>
    </main>

    <aside style="flex:1; padding: 16px; border-left: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px;">
      <!-- Team Locations -->
      <section id="team-locations-section">
        <h2 class="section-title">📡 Team Locations</h2>
        <div id="team-locations-list" style="display:flex; flex-direction: column; gap: 8px;">
          <p class="log-empty">No team locations yet.</p>
        </div>
      </section>

      <!-- Requests Stack -->
      <section id="requests-section" class="hidden">
        <h2 class="section-title">🕒 Pending Requests</h2>
        <div id="requests-list" style="display:flex; flex-direction: column; gap: 10px;">
          <!-- dynamically populated -->
        </div>
      </section>

      <!-- Event Log -->
      <section id="log-section">
        <h2 class="section-title">📋 Event Log</h2>
        <div id="event-log" class="event-log">
          <p class="log-empty">No events yet.</p>
        </div>
      </section>
    </aside>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden" onclick="modalBackdropClick(event,'settings-modal')">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h2>⚙️ Settings</h2>
        <button class="modal-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal-body" id="settings-body"><!-- populated by JS --></div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveSettings()">💾 Save Settings</button>
        <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add Team Modal -->
  <div id="add-team-modal" class="modal hidden" onclick="modalBackdropClick(event,'add-team-modal')">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2>➕ Add Team</h2>
        <button class="modal-close" onclick="closeAddTeam()">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;flex-direction:column;gap:12px">
          <label style="display:flex;flex-direction:column;gap:4px;font-size:0.88rem">
            Team Name
            <input type="text" id="new-team-name" class="adjust-input" style="width:100%" placeholder="e.g. Team Green">
          </label>
          <label style="display:flex;align-items:center;justify-content:space-between;font-size:0.88rem">
            Team Color
            <input type="color" id="new-team-color" value="#2ecc71" style="width:44px;height:30px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;padding:2px">
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-success" onclick="submitAddTeam()">➕ Add Team</button>
        <button class="btn btn-secondary" onclick="closeAddTeam()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2 id="confirm-title">Confirm Action</h2>
      </div>
      <div class="modal-body">
        <p id="confirm-message"></p>
      </div>
      <div class="modal-footer">
        <button id="confirm-ok" class="btn btn-danger">✔ Confirm</button>
        <button class="btn btn-secondary" onclick="closeConfirm()">✕ Cancel</button>
      </div>
    </div>
  </div>

  <!-- Accounts Modal -->
  <div id="accounts-modal" class="modal hidden" onclick="modalBackdropClick(event,'accounts-modal')">
    <div class="modal-content modal-md">
      <div class="modal-header">
        <h2>👥 System Accounts</h2>
        <button class="modal-close" onclick="closeAccountsModal()">✕</button>
      </div>
      <div class="modal-body" id="accounts-body"></div>
      <div class="modal-footer">
        <input type="text" id="new-admin-user" placeholder="Username" class="adjust-input" style="width:100px;margin-right:4px">
        <input type="password" id="new-admin-pass" placeholder="Password" class="adjust-input" style="width:100px;margin-right:4px">
        <select id="new-admin-role" class="adjust-input" style="width:80px;margin-right:8px">
          <option value="admin">Admin</option>
          <option value="helper">Helper</option>
        </select>
        <button class="btn btn-success" onclick="addAccount()">➕ Add Account</button>
        <button class="btn btn-secondary" onclick="closeAccountsModal()" style="margin-left:auto">Close</button>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2>🔐 Admin Login</h2>
        <button class="modal-close" onclick="closeLoginModal()">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;flex-direction:column;gap:12px">
          <input type="text" id="login-username" class="adjust-input" placeholder="Username" onkeydown="if(event.key==='Enter') submitLogin()">
          <input type="password" id="login-password" class="adjust-input" placeholder="Password" onkeydown="if(event.key==='Enter') submitLogin()">
          <p id="login-error" style="color:var(--danger);font-size:0.85rem;display:none;margin:0"></p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-success" onclick="submitLogin()" style="width:100%">Login</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
